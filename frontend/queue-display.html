<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Live Queue — MediQueue</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #F5F4F0;
            font-family: system-ui, sans-serif;
        }
        
        .token-big {
            font-family: monospace;
            font-size: 3.2rem;
            font-weight: 700;
            line-height: 1;
        }
        
        .pulse {
            animation: tp 2s ease infinite;
        }
        
        @keyframes tp {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: .85;
                transform: scale(.98);
            }
        }
        /* Filter buttons */
        
        .filter-btn {
            padding: 7px 16px;
            border-radius: 99px;
            border: 0.5px solid #C8C6BE;
            background: #fff;
            color: #6B6A64;
            font-size: .8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
        }
        
        .filter-btn.active {
            background: #185FA5;
            border-color: #185FA5;
            color: #fff;
        }
        
        .filter-btn:hover:not(.active) {
            background: #ECEAE3;
        }
        /* Department cards */
        
        .dept-board {
            background: #fff;
            border: 0.5px solid #D3D1C7;
            border-radius: 16px;
            padding: 20px;
            transition: box-shadow .2s;
        }
        
        .dept-board:hover {
            box-shadow: 0 2px 12px rgba(0, 0, 0, .07);
        }
        
        .dept-board.hidden {
            display: none;
        }
        
        .stat-box {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
        }
        /* Top nav buttons */
        
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 10px;
            border: 0.5px solid #D3D1C7;
            background: #fff;
            color: #444441;
            font-size: .82rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }
        
        .nav-btn:hover {
            background: #E6F1FB;
            border-color: #85B7EB;
            color: #185FA5;
        }
        
        .nav-btn.primary {
            background: #185FA5;
            border-color: #185FA5;
            color: #fff;
        }
        
        .nav-btn.primary:hover {
            background: #0C447C;
            border-color: #0C447C;
            color: #fff;
        }
        /* Spinner */
        
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #D3D1C7;
            border-top-color: #185FA5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- TOP NAVBAR -->
    <div style="background:#fff;border-bottom:0.5px solid #D3D1C7;padding:12px 24px;
                display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:20px">🏥</span>
            <span style="font-weight:700;font-size:1rem;color:#2C2C2A">MediQueue</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
            <a href="dashboard.html" class="nav-btn">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                    <rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
                    <rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor"/>
                    <rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
                    <rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor"/>
                </svg> Patient Dashboard
            </a>
            <a href="appointment.html" class="nav-btn">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                    <rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M5 1v4M11 1v4M1 7h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg> Book Appointment
            </a>
            <a href="doctor-panel.html" class="nav-btn primary">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                    <circle cx="8" cy="5" r="3.5" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg> Doctor Panel
            </a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div style="padding:24px">

        <!-- Page Title -->
        <div style="text-align:center;margin-bottom:20px">
            <h1 style="color:#2C2C2A;font-size:1.6rem;font-weight:700">Live Token Display</h1>
            <p style="color:#888780;margin-top:4px;font-size:.85rem" id="lastUpdated">Loading queue data…</p>
        </div>

        <!-- Department Filter -->
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:24px">
            <button class="filter-btn active" onclick="filterDept('all')" id="btn-all">🏥 All Departments</button>
            <button class="filter-btn" onclick="filterDept('General')" id="btn-General">🏥 General</button>
            <button class="filter-btn" onclick="filterDept('ENT')" id="btn-ENT">👂 ENT</button>
            <button class="filter-btn" onclick="filterDept('Cardiology')" id="btn-Cardiology">❤️ Cardiology</button>
            <button class="filter-btn" onclick="filterDept('Orthopedics')" id="btn-Orthopedics">🦴 Orthopedics</button>
            <button class="filter-btn" onclick="filterDept('Pediatrics')" id="btn-Pediatrics">👶 Pediatrics</button>
        </div>

        <!-- Department Boards -->
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px" id="deptBoards">
            <div style="grid-column:1/-1;text-align:center;padding:48px">
                <div class="spinner"></div>
                <p style="color:#888780;margin-top:16px;font-size:.9rem">Loading queue data…</p>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        const DEPT_ICONS = {
            General: '🏥',
            ENT: '👂',
            Cardiology: '❤️',
            Orthopedics: '🦴',
            Pediatrics: '👶'
        };
        let currentFilter = 'all';

        function filterDept(dept) {
            currentFilter = dept;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + (dept === 'all' ? 'all' : dept)).classList.add('active');
            document.querySelectorAll('.dept-board').forEach(board => {
                if (dept === 'all' || board.dataset.dept === dept) {
                    board.classList.remove('hidden');
                } else {
                    board.classList.add('hidden');
                }
            });
        }

        async function loadQueue() {
            try {
                const data = await apiCall('/queue-status');
                const queues = data.queues || [];
                renderQueues(queues);
            } catch (e) {
                document.getElementById('deptBoards').innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:40px">
                        <div style="font-size:40px;margin-bottom:12px">⚠️</div>
                        <p style="color:#888780">Could not load queue data. Server may be offline.</p>
                    </div>`;
            }
        }

        function renderQueues(queues) {
            const now = new Date().toLocaleTimeString('en-IN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdated').textContent =
                `Last updated: ${now} · Auto-refreshes every 10 seconds`;

            document.getElementById('deptBoards').innerHTML = queues.map(q => {
                        const hasActive = q.current_token !== null;
                        const pct = q.total_today > 0 ? Math.round((q.completed_count / q.total_today) * 100) : 0;
                        const isHidden = currentFilter !== 'all' && currentFilter !== q.department;

                        return `
                <div class="dept-board${isHidden ? ' hidden' : ''}" data-dept="${q.department}">

                    <!-- Dept header -->
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
                        <div style="display:flex;align-items:center;gap:10px">
                            <span style="font-size:24px">${DEPT_ICONS[q.department] || '🏥'}</span>
                            <div>
                                <div style="color:#2C2C2A;font-weight:600;font-size:.95rem">${q.department}</div>
                                <div style="color:#888780;font-size:.74rem">Room ${q.room_number || '—'}</div>
                            </div>
                        </div>
                        <span style="background:#EAF3DE;color:#27500A;font-size:.7rem;font-weight:600;
                            padding:3px 10px;border-radius:99px;border:0.5px solid #C0DD97">● Open</span>
                    </div>

                    <!-- NOW SERVING -->
                    <div style="text-align:center;padding:18px;
                        background:${hasActive ? '#E1F5EE' : '#F5F4F0'};
                        border-radius:12px;
                        border:0.5px solid ${hasActive ? '#5DCAA5' : '#D3D1C7'};
                        margin-bottom:14px">
                        <div style="font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;
                            color:${hasActive ? '#0F6E56' : '#B4B2A9'};margin-bottom:6px">Now Serving</div>
                        <div class="token-big ${hasActive ? 'pulse' : ''}"
                            style="color:${hasActive ? '#0F6E56' : '#C8C6BE'}">
                            ${hasActive ? '#' + String(q.current_token).padStart(3, '0') : '—'}
                        </div>
                    </div>

                    <!-- Stats row -->
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
                        <div class="stat-box" style="background:#FAEEDA;border:0.5px solid #FAC775">
                            <div style="font-family:monospace;font-size:1.4rem;font-weight:700;color:#633806">${q.waiting_count}</div>
                            <div style="font-size:.68rem;color:#854F0B;margin-top:2px">Waiting</div>
                        </div>
                        <div class="stat-box" style="background:#EAF3DE;border:0.5px solid #C0DD97">
                            <div style="font-family:monospace;font-size:1.4rem;font-weight:700;color:#27500A">${q.completed_count}</div>
                            <div style="font-size:.68rem;color:#3B6D11;margin-top:2px">Completed</div>
                        </div>
                        <div class="stat-box" style="background:#E6F1FB;border:0.5px solid #B5D4F4">
                            <div style="font-family:monospace;font-size:1.4rem;font-weight:700;color:#0C447C">${q.total_today}</div>
                            <div style="font-size:.68rem;color:#185FA5;margin-top:2px">Total Today</div>
                        </div>
                    </div>

                    <!-- Next token -->
                    ${q.next_token ? `
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;
                        background:#F5F4F0;border-radius:8px;border:0.5px solid #D3D1C7">
                        <span style="font-size:.77rem;color:#888780">Next up</span>
                        <span style="font-family:monospace;font-weight:600;color:#444441">#${String(q.next_token).padStart(3, '0')}</span>
                    </div>` : ''}

                    <!-- Progress bar -->
                    <div style="margin-top:12px">
                        <div style="display:flex;justify-content:space-between;font-size:.71rem;color:#B4B2A9;margin-bottom:4px">
                            <span>Daily Progress</span><span>${pct}%</span>
                        </div>
                        <div style="height:5px;background:#ECEAE3;border-radius:99px;overflow:hidden">
                            <div style="height:100%;width:${pct}%;
                                background:linear-gradient(90deg,#185FA5,#1D9E75);
                                border-radius:99px;transition:width .6s"></div>
                        </div>
                    </div>

                </div>`;
            }).join('');
        }

        loadQueue();
        setInterval(loadQueue, 10000);
    </script>

</body>

</html>
